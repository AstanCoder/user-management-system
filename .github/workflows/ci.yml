name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run backend tests
        run: ./gradlew :backend:test --no-daemon

  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  docker-compose-smoke:
    name: Docker Compose smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Prepare environment
        run: cp .env.example .env

      - name: Start stack
        run: docker compose -f docker/docker-compose.yml up --build -d

      - name: Wait for backend
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api-docs || true)
            if [ "$code" = "200" ]; then
              echo "Backend ready"
              exit 0
            fi
            echo "Waiting for backend... ($i/60) status=$code"
            sleep 5
          done
          echo "Backend did not become ready in time"
          docker compose -f docker/docker-compose.yml logs backend
          exit 1

      - name: Wait for frontend
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/login || true)
            if [ "$code" = "200" ]; then
              echo "Frontend ready"
              exit 0
            fi
            echo "Waiting for frontend... ($i/60) status=$code"
            sleep 5
          done
          echo "Frontend did not become ready in time"
          docker compose -f docker/docker-compose.yml logs frontend
          exit 1

      - name: API smoke test
        run: |
          TOKEN=$(curl -s -X POST http://localhost:8080/api/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"admin@nexuscrm.com","password":"Admin123!"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          curl -sf -H "Authorization: Bearer $TOKEN" http://localhost:8080/api/auth/me

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.yml logs

      - name: Tear down stack
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v --remove-orphans
