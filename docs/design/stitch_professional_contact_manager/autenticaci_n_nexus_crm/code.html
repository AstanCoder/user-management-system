<body class="bg-surface-container-lowest text-on-surface font-body-md min-h-screen flex items-center justify-center p-md">
<!-- Auth Card -->
<main class="w-full max-w-[400px] bg-surface border border-outline-variant rounded-xl p-xl shadow-sm flex flex-col gap-lg">
<!-- Header / Logo -->
<div class="flex flex-col items-center text-center gap-sm">
<div class="w-12 h-12 bg-surface-container flex items-center justify-center rounded-full text-primary mb-2">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: &#39;FILL&#39; 1;">contacts</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary">Nexus CRM</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Acceso seguro al portal administrativo</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-md mt-sm">
<!-- Email Input -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface" for="email">Correo electrónico</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full pl-10 pr-3 py-2 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-secondary focus:ring-2 focus:ring-secondary/10 transition-shadow" id="email" name="email" placeholder="ejemplo@empresa.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-base">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Contraseña</label>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-10 pr-3 py-2 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-secondary focus:ring-2 focus:ring-secondary/10 transition-shadow" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full mt-2 bg-primary-container text-on-primary py-2.5 rounded-lg font-label-md text-label-md hover:bg-tertiary transition-colors flex justify-center items-center gap-2 shadow-sm" type="submit">
                Iniciar Sesión
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Footer / Sign Up Link -->
<div class="text-center mt-2 border-t border-outline-variant pt-md">
<p class="font-body-md text-body-md text-on-surface-variant">
                ¿No tienes una cuenta? 
                <a class="font-label-md text-label-md text-primary hover:underline ml-1" href="#">Registrarse</a>
</p>
</div>
</main>
