<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col justify-center items-center p-margin-desktop">
<!-- Navigation Shell is suppressed per rules for Transactional/Login screens -->
<main class="w-full max-w-[440px]">
<!-- Brand Header Context -->
<div class="flex flex-col items-center mb-xl">
<div class="h-12 w-12 bg-primary-container rounded-lg flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-on-primary fill" style="font-size: 28px;">contacts</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary">Nexus CRM</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-sm">Data-driven clarity.</p>
</div>
<!-- Login Card (Level 1 Surface + Level 2 subtle elevation/border combo per style guide) -->
<div class="bg-surface-container-lowest border border-surface-container-highest rounded-xl p-xl shadow-[0px_4px_12px_rgba(27,38,59,0.05)]">
<h2 class="font-headline-sm text-headline-sm text-primary mb-md">Log in to your account</h2>
<form action="#" class="space-y-lg" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email Address</label>
<input class="bg-surface-container-lowest border border-surface-container-highest rounded-DEFAULT px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-secondary focus:ring-2 focus:ring-secondary/10 w-full" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface-variant flex justify-between" for="password">
                        Password
                        <a class="text-secondary hover:text-primary-container hover:underline" href="#">Forgot password?</a>
</label>
<input class="bg-surface-container-lowest border border-surface-container-highest rounded-DEFAULT px-md py-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-secondary focus:ring-2 focus:ring-secondary/10 w-full" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-sm">
<input class="h-4 w-4 rounded-DEFAULT border-surface-container-highest text-primary-container focus:ring-secondary/10 bg-surface-container-lowest" id="remember" name="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant" for="remember">Remember me for 30 days</label>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-primary-container text-on-primary font-label-md text-label-md rounded-lg py-[10px] px-lg hover:bg-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container" type="submit">
                    Log In
                </button>
</form>
<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="font-label-md text-label-md text-secondary hover:text-primary-container hover:underline" href="#">Contact Administrator</a>
</p>
</div>
</div>
</main>
