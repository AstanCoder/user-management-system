<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile md:px-margin-desktop py-base bg-surface dark:bg-surface-dim max-w-max-width mx-auto border-b border-outline-variant dark:border-outline">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed cursor-pointer">arrow_back</span>
<span class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed md:block hidden">Nexus CRM</span>
<span class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed md:hidden block">Nexus CRM</span>
</div>
<div>
<!-- Suppress Avatar in task-focused page -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-[72px] pb-[80px] px-margin-mobile md:px-margin-desktop max-w-max-width mx-auto w-full">
<div class="max-w-2xl mx-auto bg-surface-container-lowest border border-outline-variant rounded-xl p-lg shadow-sm">
<div class="mb-xl text-center md:text-left">
<h1 class="font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg text-primary mb-xs">Agregar Contacto</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Complete los detalles para añadir un nuevo registro al directorio.</p>
</div>
<form class="space-y-gutter">
<!-- Name Section -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="firstName">Nombre</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-[#415A77] focus:ring-2 focus:ring-[#415A77]/10 transition-shadow placeholder:text-outline" id="firstName" name="firstName" placeholder="Ej. Ana" type="text"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="lastName">Apellidos</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-[#415A77] focus:ring-2 focus:ring-[#415A77]/10 transition-shadow placeholder:text-outline" id="lastName" name="lastName" placeholder="Ej. García" type="text"/>
</div>
</div>
<!-- Professional Info -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="company">Empresa</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-[#415A77] focus:ring-2 focus:ring-[#415A77]/10 transition-shadow placeholder:text-outline" id="company" name="company" placeholder="Ej. Acme Corp" type="text"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="jobTitle">Cargo</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-[#415A77] focus:ring-2 focus:ring-[#415A77]/10 transition-shadow placeholder:text-outline" id="jobTitle" name="jobTitle" placeholder="Ej. Directora de Marketing" type="text"/>
</div>
</div>
<!-- Contact Info -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="phone">Teléfono</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline text-[20px]">phone</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT pl-[44px] pr-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-[#415A77] focus:ring-2 focus:ring-[#415A77]/10 transition-shadow placeholder:text-outline" id="phone" name="phone" placeholder="+34 600 000 000" type="tel"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="email">Correo Electrónico</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT pl-[44px] pr-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-[#415A77] focus:ring-2 focus:ring-[#415A77]/10 transition-shadow placeholder:text-outline" id="email" name="email" placeholder="ana.garcia@ejemplo.com" type="email"/>
</div>
</div>
</div>
<!-- Notes Section -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="notes">Notas</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-[#415A77] focus:ring-2 focus:ring-[#415A77]/10 transition-shadow placeholder:text-outline resize-none" id="notes" name="notes" placeholder="Información adicional relevante..." rows="4"></textarea>
</div>
<!-- Action Buttons -->
<div class="flex flex-col-reverse md:flex-row justify-end gap-md pt-md border-t border-outline-variant">
<button class="w-full md:w-auto px-lg py-[10px] bg-[#E0E1DD] text-[#1B263B] font-label-md text-label-md rounded-DEFAULT hover:bg-[#d1d2ce] transition-colors" type="button">
                        Cancelar
                    </button>
<button class="w-full md:w-auto px-lg py-[10px] bg-[#1B263B] text-white font-label-md text-label-md rounded-DEFAULT hover:bg-[#121a28] transition-colors flex justify-center items-center gap-xs" type="submit">
<span class="material-symbols-outlined text-[18px]">save</span>
                        Guardar
                    </button>
</div>
</form>
</div>
