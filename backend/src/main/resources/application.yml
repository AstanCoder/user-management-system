spring:
  application:
    name: contact-list-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/contacts}
    username: ${SPRING_DATASOURCE_USERNAME:contacts}
    password: ${SPRING_DATASOURCE_PASSWORD:contacts}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:nexus-crm-dev-secret-key-min-32-chars!!}
    expiration-hours: ${JWT_EXPIRATION_HOURS:24}
  identity:
    password-reset-token-expiration-minutes: ${APP_IDENTITY_PASSWORD_RESET_TOKEN_EXPIRATION_MINUTES:30}
    invitation-token-expiration-hours: ${APP_IDENTITY_INVITATION_TOKEN_EXPIRATION_HOURS:24}
    token-cleanup-cron: ${APP_IDENTITY_TOKEN_CLEANUP_CRON:0 */30 * * * *}
  security:
    token-hash-secret: ${APP_SECURITY_TOKEN_HASH_SECRET:${JWT_SECRET:nexus-crm-dev-secret-key-min-32-chars!!}}
    rate-limit:
      login:
        capacity-per-minute: ${APP_SECURITY_RATE_LIMIT_LOGIN_CAPACITY_PER_MINUTE:20}
        failure-capacity-per-15-minutes: ${APP_SECURITY_RATE_LIMIT_LOGIN_FAILURE_CAPACITY_PER_15_MINUTES:10}
      forgot-password:
        capacity-per-hour: ${APP_SECURITY_RATE_LIMIT_FORGOT_PASSWORD_CAPACITY_PER_HOUR:8}
  mail:
    from: ${APP_MAIL_FROM:noreply@nexuscrm.com}
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:3000}
  avatar:
    provider: ${APP_AVATAR_PROVIDER:minio}
    storage-path: ${APP_AVATAR_STORAGE_PATH:./data/avatars}
    public-base-url: ${APP_AVATAR_PUBLIC_BASE_URL:http://localhost:8080}
    minio:
      endpoint: ${APP_AVATAR_MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${APP_AVATAR_MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${APP_AVATAR_MINIO_SECRET_KEY:minioadmin}
      bucket: ${APP_AVATAR_MINIO_BUCKET:avatars}
  imgproxy:
    base-url: ${APP_IMGPROXY_BASE_URL:http://localhost:8082}
    key: ${APP_IMGPROXY_KEY:0123456789abcdef0123456789abcdef}
    salt: ${APP_IMGPROXY_SALT:abcdef0123456789abcdef0123456789}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.example: INFO
