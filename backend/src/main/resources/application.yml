spring:
  application:
    name: contact-list-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/contacts}
    username: ${SPRING_DATASOURCE_USERNAME:contacts}
    password: ${SPRING_DATASOURCE_PASSWORD:contacts}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:nexus-crm-dev-secret-key-min-32-chars!!}
    expiration-hours: ${JWT_EXPIRATION_HOURS:24}
  mail:
    from: ${APP_MAIL_FROM:noreply@nexuscrm.com}
  avatar:
    storage-path: ${APP_AVATAR_STORAGE_PATH:./data/avatars}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.example: INFO
