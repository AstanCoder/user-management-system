databaseChangeLog:
  - changeSet:
      id: 004-create-notes
      author: nexus-crm-expansion
      changes:
        - createTable:
            tableName: notes
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: contact_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: author_user_id
                  type: uuid
              - column:
                  name: content
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: notes
            baseColumnNames: contact_id
            referencedTableName: contacts
            referencedColumnNames: id
            constraintName: fk_notes_contact
            onDelete: CASCADE
      rollback:
        - dropTable:
            tableName: notes
