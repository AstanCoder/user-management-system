databaseChangeLog:
  - changeSet:
      id: 011-enforce-password-hash-for-non-invited-users
      author: nexus-crm-expansion
      changes:
        - sql:
            sql: >
              ALTER TABLE users
              ADD CONSTRAINT chk_users_password_hash_requires_invited_status
              CHECK (password_hash IS NOT NULL OR status = 'INVITED');
      rollback:
        - sql:
            sql: >
              ALTER TABLE users
              DROP CONSTRAINT IF EXISTS chk_users_password_hash_requires_invited_status;
