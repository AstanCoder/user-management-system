databaseChangeLog:
  - changeSet:
      id: 010-allow-null-password-hash-for-invited-users
      author: nexus-crm-expansion
      changes:
        - dropNotNullConstraint:
            tableName: users
            columnName: password_hash
            columnDataType: varchar(255)
      rollback:
        - update:
            tableName: users
            columns:
              - column:
                  name: password_hash
                  value: ''
            where: password_hash IS NULL
        - addNotNullConstraint:
            tableName: users
            columnName: password_hash
            columnDataType: varchar(255)
