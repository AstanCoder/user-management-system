databaseChangeLog:
  - changeSet:
      id: 001-create-contacts-table
      author: contact-list-system
      changes:
        - createTable:
            tableName: contacts
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: first_name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: varchar(30)
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  constraints:
                    nullable: false
        - sql:
            sql: CREATE UNIQUE INDEX ux_contacts_email ON contacts (LOWER(email));
      rollback:
        - dropTable:
            tableName: contacts
