databaseChangeLog:
  - changeSet:
      id: 012-create-invitation-tokens
      author: nexus-crm-expansion
      changes:
        - createTable:
            tableName: invitation_tokens
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: token
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: used_at
                  type: timestamptz
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: invitation_tokens
            columnNames: token
            constraintName: ux_invitation_tokens_token
        - addForeignKeyConstraint:
            baseTableName: invitation_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_invitation_tokens_user
            onDelete: CASCADE
      rollback:
        - dropTable:
            tableName: invitation_tokens
